# 테스트 환경 배포
# 트리거: dev 브랜치 push
# 커스텀 필요: 배포 대상(Vercel/Cloudflare/Docker), 환경변수

name: Deploy Test

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-test
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

